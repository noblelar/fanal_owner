name: Fanal_Owner - Build & Deploy AWS EC2 via SSM

on:
  push:
    branches: ["master"]

env:
  IMAGE: fanalarkgroup/fanal_owner
  REGISTRY: docker.io
  TAG_SHA: ${{ github.sha }}
  TAG_LATEST: latest

jobs:
  build-push:
    runs-on: ubuntu-latest
    environment: production_env

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push owner image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.TAG_SHA }}
            ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ env.TAG_LATEST }}

  deploy:
    needs: build-push
    runs-on: ubuntu-latest
    environment: production_env

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials from GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Send SSM command to deploy owner app
        id: ssm
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy Fanal owner app from GitHub Actions" \
            --parameters 'commands=["sudo -iu ubuntu /home/ubuntu/fanal_owner/scripts/deploy-web.sh"]' \
            --timeout-seconds 900 \
            --query "Command.CommandId" \
            --output text)

          echo "COMMAND_ID=$COMMAND_ID" >> $GITHUB_ENV
          echo "SSM command sent: $COMMAND_ID"

      - name: Wait for SSM command result
        run: |
          for i in {1..60}; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
              --query "Status" \
              --output text)

            echo "Current status: $STATUS"

            if [ "$STATUS" = "Success" ]; then
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardOutputContent" \
                --output text
              exit 0
            fi

            if [ "$STATUS" = "Cancelled" ] || [ "$STATUS" = "TimedOut" ] || [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelling" ]; then
              echo "Deployment failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 10
          done

          echo "Timed out waiting for SSM command completion"
          exit 1
